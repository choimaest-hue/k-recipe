<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg-gbt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ff"/>
      <stop offset="100%" stop-color="#d8ccf0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" rx="36" fill="url(#bg-gbt)"/>
  <!-- bowl shadow -->
  <ellipse cx="400" cy="382" rx="192" ry="50" fill="#404060" opacity="0.12"/>
  <!-- bowl outer -->
  <ellipse cx="400" cy="360" rx="188" ry="66" fill="#e4e0d8"/>
  <!-- bowl rim -->
  <ellipse cx="400" cy="330" rx="178" ry="44" fill="#f0ece4"/>
  <!-- light amber clear broth -->
  <ellipse cx="400" cy="320" rx="165" ry="36" fill="#f8f0d8" opacity="0.9"/>
  <!-- rib bone 1 -->
  <path d="M320 316 L360 296" stroke="#f0e8d0" stroke-width="18" stroke-linecap="round"/>
  <circle cx="316" cy="318" r="14" fill="#f0e8d0"/>
  <circle cx="364" cy="294" r="12" fill="#f0e8d0"/>
  <!-- rib bone 2 -->
  <path d="M370 328 L410 308" stroke="#ece4c8" stroke-width="16" stroke-linecap="round"/>
  <circle cx="366" cy="330" r="13" fill="#ece4c8"/>
  <circle cx="414" cy="306" r="11" fill="#ece4c8"/>
  <!-- rib bone 3 -->
  <path d="M430 316 L468 300" stroke="#f0e8d0" stroke-width="14" stroke-linecap="round"/>
  <circle cx="428" cy="318" r="12" fill="#f0e8d0"/>
  <circle cx="470" cy="298" r="10" fill="#f0e8d0"/>
  <!-- bone marrow hint -->
  <circle cx="316" cy="318" r="5" fill="#e0d0b8" opacity="0.6"/>
  <circle cx="364" cy="294" r="4" fill="#e0d0b8" opacity="0.55"/>
  <!-- daikon cubes -->
  <rect x="326" y="310" width="28" height="22" rx="5" fill="#f8f8f0" stroke="#d8d8c0" stroke-width="1.5" opacity="0.8"/>
  <!-- scallion rings -->
  <circle cx="450" cy="316" r="5" fill="none" stroke="#5a8040" stroke-width="2.5" opacity="0.8"/>
  <circle cx="464" cy="306" r="4" fill="none" stroke="#5a8040" stroke-width="2.5" opacity="0.75"/>
  <!-- pepper -->
  <ellipse cx="482" cy="312" r="4" fill="none"/>
  <circle cx="483" cy="296" r="3" fill="#d04030" opacity="0.5"/>
  <!-- light steam -->
  <path d="M375 278 Q368 264 375 250 Q382 236 375 222" stroke="#c0b8e0" stroke-width="3.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M415 275 Q408 261 415 247 Q422 233 415 219" stroke="#c0b8e0" stroke-width="3.5" fill="none" opacity="0.32" stroke-linecap="round"/>
  <text x="64" y="108" font-size="44" font-weight="700" fill="#504878" font-family="sans-serif">갈비탕</text>
  <text x="64" y="156" font-size="24" fill="#5a5070" font-family="sans-serif">GALBITANG</text>
</svg>
