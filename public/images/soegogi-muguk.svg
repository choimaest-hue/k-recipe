  <ellipse cx="400" cy="320" rx="168" ry="36" fill="#e8f0f8" opacity="0.9"/>
  <!-- daikon (mu) white cubes -->
  <rect x="328" y="296" width="44" height="34" rx="8" fill="#f8f8f0" stroke="#d8d8c8" stroke-width="2"/>
  <rect x="382" y="290" width="40" height="32" rx="8" fill="#fffff4" stroke="#d8d8c8" stroke-width="2"/>
  <rect x="432" y="298" width="36" height="30" rx="7" fill="#f8f8f0" stroke="#d8d8c8" stroke-width="2"/>
  <!-- beef pieces -->
  <ellipse cx="360" cy="320" rx="22" ry="10" fill="#c87848" opacity="0.85" transform="rotate(-10 360 320)"/>
  <ellipse cx="440" cy="316" rx="20" ry="9" fill="#b86838" opacity="0.85" transform="rotate(12 440 316)"/>
  <ellipse cx="396" cy="318" rx="18" ry="8" fill="#c07040" opacity="0.8" transform="rotate(-6 396 318)"/>
