  <circle cx="463" cy="306" r="4" fill="none" stroke="#6a9050" stroke-width="3" opacity="0.75"/>
  <circle cx="404" cy="296" r="4" fill="none" stroke="#6a9050" stroke-width="2.5" opacity="0.7"/>
  <!-- light steam -->
  <path d="M370 275 Q363 262 370 249 Q377 236 370 223" stroke="#a0c0e0" stroke-width="3.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M415 270 Q408 257 415 244 Q422 231 415 218" stroke="#a0c0e0" stroke-width="3.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <text x="64" y="108" font-size="38" font-weight="700" fill="#405880" font-family="sans-serif">소고기무국</text>
  <text x="64" y="156" font-size="22" fill="#5a6878" font-family="sans-serif">SOEGOGI MUGUK</text>
