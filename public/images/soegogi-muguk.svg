  </defs>
  <rect width="800" height="520" rx="36" fill="url(#bg-smg)"/>
  <!-- bowl shadow -->
  <ellipse cx="400" cy="382" rx="195" ry="50" fill="#506080" opacity="0.15"/>
  <!-- bowl -->
